[package]
name = "harn-buildkite-connector"
version = "0.1.0"
description = "Pure-Harn Buildkite connector: signed webhooks, CI failure normalization, retry/rebuild + job logs."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/harn-buildkite-connector"
harn = ">=0.10,<0.11"

[exports]
default = "src/lib.harn"

[[providers]]
id = "buildkite"
connector = { harn = "src/lib.harn" }
capabilities = ["webhook", "rate_limit", "pagination"]

[providers.setup]
auth_type = "api-key"
flow = "api-key"
required_secrets = ["buildkite/webhook-token", "buildkite/api-token"]
setup_command = ["harn", "connect", "buildkite"]
validation_command = ["harn", "connect", "status", "--connector", "buildkite", "--json"]

[[providers.setup.health_checks]]
id = "webhook-token"
kind = "secret"
secret = "buildkite/webhook-token"

[[providers.setup.health_checks]]
id = "api-token"
kind = "secret"
secret = "buildkite/api-token"

[providers.setup.recovery]
missing_auth = "Store buildkite/webhook-token (webhook signing/token) and buildkite/api-token (REST Bearer) before enabling Buildkite bindings."
expired_credentials = "Rotate buildkite/api-token in Buildkite (Personal Settings -> API Access Tokens) and rerun Buildkite validation."
revoked_credentials = "Replace buildkite/api-token with an active token scoped read_builds (build.get), read_build_logs (job.log), and write_builds (retry/rebuild/cancel/unblock). Enable GraphQL API access when using graphql."
missing_scopes = "Grant read_builds (build.get), read_build_logs (job.log), and write_builds (retry/rebuild/cancel/unblock). Enable GraphQL API access when using graphql."
inaccessible_resource = "Confirm the token can access the target organization and pipeline."
transient_provider_outage = "Retry after the Buildkite API and webhook endpoints are healthy."

[connector_contract]
version = 1

[[connector_contract.fixtures]]
provider = "buildkite"
name = "build finished passed webhook"
kind = "webhook"
headers = { "X-Buildkite-Event" = "build.finished", "X-Buildkite-Signature" = "timestamp=1776859200,signature=1a1c0e0e2e9cdd257dc186d03f85791bc44ee5f070ad96950382161870ef544a", "content-type" = "application/json" }
metadata = { secret_ids = { webhook_token = "buildkite/webhook-token" } }
body = '''{"event":"build.finished","build":{"id":"b1111111-1111-1111-1111-111111111111","number":42,"state":"passed","commit":"aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa","branch":"main","message":"Add the thing","web_url":"https://buildkite.com/acme/web/builds/42","source":"webhook","created_at":"2026-06-02T10:00:00.000Z","scheduled_at":"2026-06-02T10:00:01.000Z","started_at":"2026-06-02T10:00:05.000Z","finished_at":"2026-06-02T10:03:30.000Z"},"pipeline":{"id":"p2222222-2222-2222-2222-222222222222","name":"web","slug":"web","repository":"git@github.com:acme/web.git","provider":{"id":"github","settings":{"account":"acme"}}},"sender":{"id":"u3333333","name":"Ada Lovelace"}}'''
expect_type = "event"
expect_kind = "build.passed"
expect_dedupe_key = "buildkite:web:42:build.finished:passed"
expect_signature_state = "verified"
expect_payload_contains = { provider = "buildkite", schema_name = "BuildkiteEventPayload", raw = { provider = "buildkite", kind = "build.finished", state = "passed", is_failure = false, commit_sha = "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", branch = "main", pipeline_slug = "web", build_number = 42 } }
expect_event_count = 1

